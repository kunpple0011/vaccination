<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaccination</title>
    <style>
        /* 页面整体设定：深蓝黑底色，消除边缘留白 */
        body {
            background-color: #050a15; 
            color: #d0d0d0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        /* 核心内容容器限制宽度，确保在电脑和手机上都好看 */
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        /* 封面图设定：宽度铺满容器，加上微微的深色阴影增加立体感 */
        img {
            width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 35px;
        }
        /* 文案排版：字号克制，行距拉开，冷峻的灰色 */
        .description {
            font-size: 13px;
            line-height: 2;
            letter-spacing: 1px;
            margin-bottom: 40px;
            color: #8a92a3;
        }
        .description p {
            margin: 8px 0;
        }
        /* 播放器设定 */
        audio {
            width: 100%;
            outline: none;
            opacity: 0.8; /* 稍微降低透明度，使其融入暗色背景 */
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="cover.jpg" alt="vaccination">
        
        <div class="description">
            <p>The rearview mirror is fogging up.</p>
            <p>Trying to calibrate sanity with the most precise scales.<br>
               The hands of the clock run out, yet in the end,<br>
               I can only surrender as the dose diffuses through my bloodstream.</p>
            <p>This is an inflammation I can neither quit nor cure.</p>
        </div>

        <audio controls>
            <source src="vaccination.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
</body>
</html>
