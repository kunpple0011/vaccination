<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vaccination</title>
    <style>
        /* 页面整体设定：深蓝黑底色 */
        body {
            background-color: #050a15; 
            color: #d0d0d0;
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px; /* 稍微减小了整体页面的内边距 */
            box-sizing: border-box;
        }
        /* 核心内容容器限制宽度 */
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        /* 封面图设定 */
        img {
            width: 100%;
            height: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 20px; /* 压缩了图文间距 */
        }
        /* 中文文案排版：微调了行高和字间距，使其在手机一屏内显示完全 */
        .description {
            font-size: 14px;
            line-height: 1.8; /* 稍微收紧了行高 */
            letter-spacing: 1px;
            margin-bottom: 20px; /* 压缩了文字与播放器的间距 */
            color: #9ba3b8; 
        }
        .description p {
            margin: 8px 0; /* 压缩了段落之间的空行 */
        }
        /* 播放器设定 */
        audio {
            width: 100%;
            outline: none;
            opacity: 0.8; 
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="cover.jpg" alt="vaccination">
        
        <div class="description">
            <p>并非特意为你而作的歌。</p>
            
            <p>在和你聊天的过程中，<br>
               我又回忆起那个曾经为自我表达而着迷的自己。<br>
               现在的我很麻木，就算你只是一根火柴，<br>
               在黑暗里也是最夺目的光，<br>
               大抵是这个意思，也有点不是。</p>
               
            <p>生日快乐，25岁后的第一个生日，真正的成人日🎂</p>
        </div>

        <audio controls>
            <source src="vaccination.mp3" type="audio/mpeg">
            您的浏览器不支持音频播放。
        </audio>
    </div>
</body>
</html>
